<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="categories_frontend.css">
</head>
<body>

<div class="container my-5">
  <h1 class="text-center mb-5">Frontend Projects</h1>

  <div class="row g-4">

    <!-- Project Card 1 -->
    <div class="col-md-4 project-card">
      <div class="card h-100 shadow-lg">
        <img src="../assets/frontend1.png" class="card-img-top" alt="Portfolio Website">
        <div class="card-body">
          <h5 class="card-title">Portfolio Website</h5>
          <p class="card-text">A beautiful personal portfolio website with HTML, CSS, JS.</p>
          <a href="#" class="btn btn-outline-primary btn-sm" target="_blank">View Project</a>
        </div>
      </div>
    </div>

    <!-- Project Card 2 -->
    <div class="col-md-4 project-card">
      <div class="card h-100 shadow-lg">
        <img src="../assets/frontend2.png" class="card-img-top" alt="Landing Page">
        <div class="card-body">
          <h5 class="card-title">Landing Page</h5>
          <p class="card-text">Modern responsive landing page template with animations.</p>
          <a href="#" class="btn btn-outline-primary btn-sm" target="_blank">View Project</a>
        </div>
      </div>
    </div>

    <!-- Project Card 3 -->
    <div class="col-md-4 project-card">
      <div class="card h-100 shadow-lg">
        <img src="../assets/frontend3.png" class="card-img-top" alt="E-commerce UI">
        <div class="card-body">
          <h5 class="card-title">E-commerce UI</h5>
          <p class="card-text">A responsive and clean UI design for an e-commerce platform.</p>
          <a href="#" class="btn btn-outline-primary btn-sm" target="_blank">View Project</a>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="categories_frontend.js"></script>
</body>
</html>
